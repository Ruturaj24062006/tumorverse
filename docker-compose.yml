version: '3.8'

services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cancer-predictor-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=false
    volumes:
      # Mount model directory for easy updates without rebuilding
      - ./backend/model:/app/model:ro
      # Mount main.py for development (optional)
      # - ./backend/main.py:/app/main.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - cancer-predictor-network

  # Frontend (Optional - if you want to run it in Docker too)
  # Uncomment these lines to run Next.js in Docker
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: cancer-predictor-web
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://api:8000
  #   depends_on:
  #     - api
  #   networks:
  #     - cancer-predictor-network

networks:
  cancer-predictor-network:
    driver: bridge
